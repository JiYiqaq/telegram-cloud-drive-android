name: Bug 报告
description: 报告可复现的应用错误
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿提交真实 Bot Token、Chat ID、同步密码、频道内容、下载 URL、密钥或未脱敏日志。

  - type: input
    id: version
    attributes:
      label: 应用版本
      placeholder: 例如 0.1.0-alpha
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备与 Android 版本
      placeholder: 例如 Pixel 8 / Android 15
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明实际结果和预期结果。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: 脱敏诊断信息
      description: 仅粘贴应用导出的诊断摘要；再次检查其中没有任何凭据或私人数据。

  - type: checkboxes
    id: safety
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容不含 Bot Token、Chat ID、同步密码、密钥或私人频道数据。
          required: true
        - label: 这不是安全漏洞；安全漏洞将按 SECURITY.md 私下报告。
          required: true
