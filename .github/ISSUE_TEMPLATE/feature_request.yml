name: 功能建议
description: 建议与项目范围一致的新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        TeleDrive Lite 坚持无自建服务器、仅使用 Telegram Bot API、本地端到端加密。请勿在建议中包含真实凭据或私人数据。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述用户场景，而不只是实现方式。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案

  - type: checkboxes
    id: scope
    attributes:
      label: 项目边界
      options:
        - label: 该建议不要求自建服务器、Telegram 用户账号登录或明文上传文件。
          required: true
        - label: 我没有在本 Issue 中包含真实凭据或私人数据。
          required: true
